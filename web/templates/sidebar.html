<!-- Sidebar Template — include ในทุกหน้า -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <span class="logo-text">NetSentinel <span style="color:var(--ac)">AI</span></span>
    </div>
    <button class="toggle-btn" onclick="toggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
  </div>
  <div class="nav-menu">
    <a href="/" data-tooltip="Dashboard" id="nav-dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span class="nav-text">Dashboard</span>
    </a>
    <a href="/traffic" data-tooltip="Traffic" id="nav-traffic">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-text">Traffic</span>
    </a>
    {% if session.get('role') == 'admin' %}
    <a href="/settings" data-tooltip="Settings" id="nav-settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span class="nav-text">Settings</span>
    </a>
    {% endif %}
  </div>
  <div class="nav-menu bottom">
    <button type="button" class="theme-toggle" data-tooltip="Theme" onclick="toggleNetSentinelTheme()">
      <svg class="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span class="nav-text"><span data-theme-label>Light</span> Mode</span>
    </button>
    <a href="/logout" data-tooltip="Logout" onclick="confirmLogout(event)">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span class="nav-text">Logout</span>
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
// Highlight active nav
(function(){const p=location.pathname;const map={'/':"nav-dashboard",'/traffic':"nav-traffic",'/settings':"nav-settings"};const id=map[p];if(id)document.getElementById(id).classList.add('active')})();
function themeColor(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

function confirmLogout(event) {
  event.preventDefault();
  Swal.fire({
    title: 'Confirm Logout',
    text: 'Are you sure you want to log out of NetSentinel AI?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Logout',
    cancelButtonText: 'Cancel',
    background: themeColor('--card'),
    color: themeColor('--txt'),
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#3a3f58',
  }).then((result) => {
    if (result.isConfirmed) {
      window.location.href = '/logout';
    }
  });
}
</script>
