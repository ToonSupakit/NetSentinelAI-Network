<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NetSentinel AI - Traffic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="/static/theme.css" rel="stylesheet">
<script src="/static/theme.js"></script>
<link href="/static/sidebar.css" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh}
.main{flex:1;min-width:0;padding:2.25rem}
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1.25rem}
.eyebrow{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:.35rem}
.header h2{font-size:1.45rem;font-weight:700;letter-spacing:0}
.header p{color:var(--muted);font-size:.86rem;margin-top:.25rem}
.status{display:flex;align-items:center;gap:.55rem;background:var(--panel);border:1px solid var(--brd);border-radius:999px;padding:.55rem .8rem;color:var(--soft);font-size:.78rem;white-space:nowrap;box-shadow:var(--shadow-sm)}
.dot{width:7px;height:7px;border-radius:999px;background:var(--green);box-shadow:0 0 10px var(--green)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem;margin-bottom:1rem}
.metric{background:var(--panel);border:1px solid var(--brd);border-radius:8px;padding:1rem;min-height:104px;box-shadow:var(--shadow-sm)}
.metric-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;color:var(--muted);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.metric-ico{width:30px;height:30px;border-radius:7px;display:grid;place-items:center}
.metric-ico.cyan{background:var(--cyan-bg);color:var(--cyan)}.metric-ico.green{background:var(--green-bg);color:var(--green)}.metric-ico.amber{background:var(--amber-bg);color:var(--amber)}.metric-ico.red{background:var(--red-bg);color:var(--red)}
.metric-val{font-size:1.85rem;font-weight:700;line-height:1}
.metric-sub{font-size:.78rem;color:var(--muted);margin-top:.5rem;min-height:1rem}
.layout{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(320px,.8fr);gap:1rem;align-items:start}
.card{background:var(--panel);border:1px solid var(--brd);border-radius:8px;padding:1.15rem;box-shadow:var(--shadow-sm)}
.card-head{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1rem}
.title{display:flex;align-items:center;gap:.55rem;font-size:.96rem;font-weight:700}
.title svg{color:var(--muted)}
.tools{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.select,.seg button{background:var(--panel-2);border:1px solid var(--brd);color:var(--soft);border-radius:7px;font-family:inherit;font-size:.78rem;height:34px}
.select{padding:0 .6rem;min-width:150px}
.seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--brd);border-radius:7px;overflow:hidden;height:34px}
.seg button{border:0;border-right:1px solid var(--brd);border-radius:0;padding:0 .75rem;cursor:pointer}
.seg button:last-child{border-right:0}
.seg button.active{background:var(--ac-bg);color:var(--ac)}
.chart-wrap{height:430px;position:relative}
.side{display:flex;flex-direction:column;gap:1rem}
.list{display:flex;flex-direction:column;gap:.65rem}
.device-row{display:grid;grid-template-columns:1fr auto;gap:.8rem;align-items:center;background:var(--panel-2);border:1px solid var(--brd);border-radius:8px;padding:.75rem}
.device-name{font-size:.86rem;font-weight:700;margin-bottom:.35rem}
.bar{height:6px;background:var(--brd-soft);border-radius:999px;overflow:hidden}
.bar span{display:block;height:100%;border-radius:999px;background:var(--cyan)}
.device-meta{text-align:right;font-size:.75rem;color:var(--muted)}
.device-meta strong{display:block;color:var(--txt);font-size:.9rem;margin-bottom:.15rem}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
th{text-align:left;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:.7rem;border-bottom:1px solid var(--brd)}
td{padding:.75rem .7rem;border-bottom:1px solid var(--brd-soft);white-space:nowrap}
tr:last-child td{border-bottom:0}
.pill{display:inline-flex;align-items:center;gap:.35rem;border-radius:999px;padding:.18rem .5rem;font-size:.7rem;font-weight:700}
.pill.ok{background:var(--green-bg);color:var(--green)}.pill.warn{background:var(--amber-bg);color:var(--amber)}.pill.hot{background:var(--red-bg);color:var(--red)}
.empty{min-height:260px;display:grid;place-items:center;text-align:center;color:var(--muted);font-size:.88rem}
.empty strong{display:block;color:var(--txt);font-size:1rem;margin-bottom:.3rem}
@media(max-width:1180px){.metrics{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.chart-wrap{height:390px}}
@media(max-width:760px){.main{padding:1rem}.header{flex-direction:column}.metrics,.side{grid-template-columns:1fr}.card-head{align-items:flex-start;flex-direction:column}.select{width:100%}.tools{width:100%}.seg{width:100%}.seg button{flex:1}.chart-wrap{height:320px}}
</style>
</head>
<body>

{% include 'sidebar.html' %}

<div class="main">
  <div class="header">
    <div>
      <div class="eyebrow">Traffic analytics</div>
      <h2>Network Traffic</h2>
      <p>Interface utilization trend from the latest collector samples.</p>
    </div>
    <div class="status"><span class="dot"></span><span id="last-update">Loading traffic...</span></div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-top"><span>Peak TX</span><span class="metric-ico cyan">TX</span></div>
      <div class="metric-val" id="m-peak-tx">-</div>
      <div class="metric-sub" id="m-peak-tx-sub">-</div>
    </div>
    <div class="metric">
      <div class="metric-top"><span>Peak RX</span><span class="metric-ico green">RX</span></div>
      <div class="metric-val" id="m-peak-rx">-</div>
      <div class="metric-sub" id="m-peak-rx-sub">-</div>
    </div>
    <div class="metric">
      <div class="metric-top"><span>Average Load</span><span class="metric-ico amber">%</span></div>
      <div class="metric-val" id="m-avg">-</div>
      <div class="metric-sub" id="m-avg-sub">Across visible devices</div>
    </div>
    <div class="metric">
      <div class="metric-top"><span>Devices</span><span class="metric-ico red">#</span></div>
      <div class="metric-val" id="m-devices">-</div>
      <div class="metric-sub" id="m-samples">-</div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="card-head">
        <div class="title">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Last Hour Trend
        </div>
        <div class="tools">
          <select class="select" id="device-filter" onchange="renderTraffic()">
            <option value="all">All devices</option>
          </select>
          <div class="seg" aria-label="Traffic metric">
            <button type="button" class="active" data-mode="both" onclick="setMode(this)">Both</button>
            <button type="button" data-mode="tx" onclick="setMode(this)">TX</button>
            <button type="button" data-mode="rx" onclick="setMode(this)">RX</button>
          </div>
        </div>
      </div>
      <div class="chart-wrap" id="chart-wrap"><canvas id="trafficChart"></canvas></div>
    </div>

    <div class="side">
      <div class="card">
        <div class="card-head"><div class="title">Top Utilization</div></div>
        <div class="list" id="top-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="title">Latest Snapshot</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Device</th><th>TX</th><th>RX</th><th>State</th></tr></thead>
            <tbody id="snapshot-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const colors=['#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#14b8a6','#f97316','#e879f9'];
let chart, rawData=[], mode='both';
function esc(s){return s?s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function pct(v){return Math.max(0,Math.min(100,Math.round((Number(v)||0)/255*100)))}
function avg(values){return values.length?values.reduce((a,b)=>a+b,0)/values.length:0}
function loadClass(v){return v>=70?'hot':v>=35?'warn':'ok'}
function setText(id,value){document.getElementById(id).textContent=value}
function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}
function setMode(btn){document.querySelectorAll('.seg button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mode=btn.dataset.mode;renderTraffic()}

function filteredData(){
  const selected=document.getElementById('device-filter').value;
  return selected==='all'?rawData:rawData.filter(d=>d.device===selected);
}

function updateDeviceFilter(devices){
  const select=document.getElementById('device-filter');
  const current=select.value;
  select.innerHTML='<option value="all">All devices</option>';
  devices.forEach(d=>{const opt=document.createElement('option');opt.value=d;opt.textContent=d;select.appendChild(opt)});
  select.value=devices.includes(current)?current:'all';
}

function renderEmpty(message){
  if(chart){chart.destroy();chart=null}
  document.getElementById('chart-wrap').innerHTML='<div class="empty"><div><strong>No traffic data</strong>'+esc(message)+'</div></div>';
  ['m-peak-tx','m-peak-rx','m-avg','m-devices'].forEach(id=>setText(id,'-'));
  setText('m-peak-tx-sub','-');setText('m-peak-rx-sub','-');setText('m-samples','-');
  document.getElementById('top-list').innerHTML='';
  document.getElementById('snapshot-body').innerHTML='';
}

function renderTraffic(){
  const data=filteredData();
  if(!data.length){renderEmpty('Collector has not returned traffic samples yet.');return}
  if(!document.getElementById('trafficChart')){
    document.getElementById('chart-wrap').innerHTML='<canvas id="trafficChart"></canvas>';
  }

  const times=[...new Set(data.map(d=>d.time))].reverse();
  const devices=[...new Set(data.map(d=>d.device))];
  const datasets=[];
  devices.forEach((dev,i)=>{
    const rows=data.filter(d=>d.device===dev).reverse();
    const color=colors[i%colors.length];
    const txData=times.map(t=>{const m=rows.find(d=>d.time===t);return m?pct(m.tx):null});
    const rxData=times.map(t=>{const m=rows.find(d=>d.time===t);return m?pct(m.rx):null});
    if(mode==='both'||mode==='tx')datasets.push({label:dev+' TX',data:txData,borderColor:color,backgroundColor:color+'22',borderWidth:2,tension:.35,pointRadius:0,pointHoverRadius:4,fill:false});
    if(mode==='both'||mode==='rx')datasets.push({label:dev+' RX',data:rxData,borderColor:color,backgroundColor:color+'1a',borderWidth:2,borderDash:[5,4],tension:.35,pointRadius:0,pointHoverRadius:4,fill:false});
  });

  const allTx=data.map(d=>pct(d.tx)),allRx=data.map(d=>pct(d.rx));
  const peakTx=Math.max(...allTx),peakRx=Math.max(...allRx);
  const peakTxRow=data.reduce((best,row)=>pct(row.tx)>pct(best.tx)?row:best,data[0]);
  const peakRxRow=data.reduce((best,row)=>pct(row.rx)>pct(best.rx)?row:best,data[0]);
  setText('m-peak-tx',peakTx+'%');setText('m-peak-tx-sub',peakTxRow.device+' at '+peakTxRow.time);
  setText('m-peak-rx',peakRx+'%');setText('m-peak-rx-sub',peakRxRow.device+' at '+peakRxRow.time);
  setText('m-avg',Math.round(avg([...allTx,...allRx]))+'%');
  setText('m-devices',devices.length.toString());setText('m-samples',data.length.toLocaleString()+' samples');

  const latestByDevice=devices.map(dev=>data.find(d=>d.device===dev)).filter(Boolean);
  renderTop(latestByDevice);
  renderSnapshot(latestByDevice);

  if(chart)chart.destroy();
  Chart.defaults.color=cssVar('--muted')||'#94a3b8';Chart.defaults.font.family="'Inter',sans-serif";
  chart=new Chart(document.getElementById('trafficChart').getContext('2d'),{
    type:'line',
    data:{labels:times,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',align:'end',labels:{boxWidth:9,usePointStyle:true,padding:14}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
      scales:{
        y:{beginAtZero:true,max:100,border:{display:false},grid:{color:cssVar('--brd-soft')||'rgba(148,163,184,.13)'},ticks:{callback:v=>v+'%'}},
        x:{grid:{display:false},ticks:{maxTicksLimit:10}}
      }
    }
  });
}

function renderTop(rows){
  const list=document.getElementById('top-list');list.innerHTML='';
  rows.map(r=>({...r,max:Math.max(pct(r.tx),pct(r.rx))})).sort((a,b)=>b.max-a.max).slice(0,5).forEach(r=>{
    const el=document.createElement('div');el.className='device-row';
    el.innerHTML='<div><div class="device-name">'+esc(r.device)+'</div><div class="bar"><span style="width:'+r.max+'%"></span></div></div><div class="device-meta"><strong>'+r.max+'%</strong><span>TX '+pct(r.tx)+' / RX '+pct(r.rx)+'</span></div>';
    list.appendChild(el);
  });
}

function renderSnapshot(rows){
  const body=document.getElementById('snapshot-body');body.innerHTML='';
  rows.sort((a,b)=>a.device.localeCompare(b.device)).forEach(r=>{
    const max=Math.max(pct(r.tx),pct(r.rx));const state=loadClass(max);
    const tr=document.createElement('tr');
    tr.innerHTML='<td style="font-weight:700">'+esc(r.device)+'</td><td>'+pct(r.tx)+'%</td><td>'+pct(r.rx)+'%</td><td><span class="pill '+state+'">'+(state==='hot'?'High':state==='warn'?'Watch':'Normal')+'</span></td>';
    body.appendChild(tr);
  });
}

async function loadTraffic(){
  try{
    const res=await fetch('/api/traffic');
    if(res.status===401){window.location='/login';return}
    if(!res.ok){const e=await res.json().catch(()=>({message:'Traffic data unavailable'}));throw new Error(e.message||'Traffic data unavailable')}
    rawData=await res.json();
    const devices=[...new Set(rawData.map(d=>d.device))].sort((a,b)=>a.localeCompare(b));
    updateDeviceFilter(devices);
    renderTraffic();
    setText('last-update','Updated '+new Date().toLocaleTimeString('th-TH'));
  }catch(e){
    renderEmpty(e.message||'Traffic data unavailable');
    setText('last-update','Traffic unavailable');
  }
}
loadTraffic();setInterval(loadTraffic,15000);
document.addEventListener('themechange',()=>{if(rawData.length)renderTraffic()});
</script>
</body>
</html>
