<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>NetSentinel AI — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="/static/theme.css" rel="stylesheet">
<script src="/static/theme.js"></script>
<link href="/static/sidebar.css" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);display:flex;min-height:100vh}
.main{flex:1;padding:2.25rem;min-width:0}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.header h2{font-size:1.25rem;font-weight:700}
.status-pill{font-size:.8rem;color:var(--txt-m);display:flex;align-items:center;gap:.5rem;background:var(--card);padding:.5rem .8rem;border-radius:999px;border:1px solid var(--brd);box-shadow:var(--shadow-sm)}
.dot{width:6px;height:6px;background:var(--ok);border-radius:50%;box-shadow:0 0 8px var(--ok)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:1.5rem}
.card{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:1.35rem;box-shadow:var(--shadow-sm)}
.stat-h{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-m);font-weight:600;margin-bottom:.75rem}
.stat-v{font-size:2rem;font-weight:700;letter-spacing:-.03em}
.stat-sub{font-size:.8rem;color:var(--txt-m)}
.grid-23{display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;align-items:start}
.ch{font-size:.95rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.82rem}
th{text-align:left;padding:.75rem;color:var(--txt-m);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--brd)}
td{padding:.75rem;border-bottom:1px solid var(--brd-soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--panel-2)}
.badge{padding:.2rem .5rem;border-radius:5px;font-size:.7rem;font-weight:500;text-transform:capitalize;border:1px solid transparent}
.b-n,.b-u{background:var(--ok-bg);color:var(--ok)}.b-a,.b-d{background:var(--err-bg);color:var(--err)}
.lbw{display:flex;align-items:center;gap:.5rem}.lb{flex:1;height:4px;background:var(--brd);border-radius:2px;overflow:hidden}.lbf{height:100%;border-radius:2px;transition:width .3s}
.bg-ok{background:var(--ok)}.bg-wrn{background:var(--wrn)}.bg-err{background:var(--err)}
.act-btn{border:none;padding:.3rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-right:.25rem}
.act-fix{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(16,185,129,.3)}.act-fix:hover{background:var(--ok);color:#fff}
.act-rl{background:var(--wrn-bg);color:var(--wrn);border:1px solid rgba(245,158,11,.3)}.act-rl:hover{background:var(--wrn);color:#fff}
.feed-wrapper{display:flex;flex-direction:column}
.feed-filter{display:flex;gap:.4rem;align-items:center;margin-bottom:.75rem}
.feed-filter input[type="date"]{background:var(--panel-2);border:1px solid var(--brd);color:var(--txt);padding:.35rem .55rem;border-radius:7px;font-family:inherit;font-size:.75rem}
.feed-filter button{background:var(--ac-bg);color:var(--ac);border:1px solid rgba(99,102,241,.3);padding:.3rem .6rem;border-radius:6px;font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit}
.feed{display:flex;flex-direction:column;gap:.75rem;max-height:600px;overflow-y:auto;padding-right:.4rem}
.feed::-webkit-scrollbar{width:5px}.feed::-webkit-scrollbar-track{background:transparent}.feed::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.fi{display:flex;gap:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--brd)}.fi:last-child{border-bottom:none}
.fs{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}.fs.a{background:var(--err-bg);color:var(--err)}.fs.o{background:var(--ok-bg);color:var(--ok)}
.fc{flex:1;min-width:0}.ft{font-weight:600;font-size:.82rem;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fsu{font-size:.7rem;color:var(--txt-m)}.ftime{font-size:.65rem;color:var(--txt-m);white-space:nowrap}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--brd);padding:.75rem 1.25rem;border-radius:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:.75rem;transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:1000}
.toast.show{transform:translateY(0);opacity:1}
.t-i{width:20px;height:20px;border-radius:50%;display:grid;place-items:center}.t-i.s{background:var(--ok);color:#fff}.t-i.e{background:var(--err);color:#fff}.t-i.a{background:var(--ac);color:#fff}
</style>
</head>
<body data-is-admin="{{ 'true' if session.get('role') == 'admin' else 'false' }}">

{% include 'sidebar.html' %}

<div class="main">
  <div class="header">
    <h2>Dashboard</h2>
    <div class="status-pill"><div class="dot"></div><span id="last-update">Connecting...</span></div>
  </div>

  <div class="grid-4">
    <div class="card"><div class="stat-h">Total Records</div><div class="stat-v" id="c-tot">-</div></div>
    <div class="card"><div class="stat-h">Anomaly Today</div><div class="stat-v" id="c-ano" style="color:var(--err)">-</div></div>
    <div class="card"><div class="stat-h">Total Normal</div><div class="stat-v" id="c-nor" style="color:var(--ok)">-</div></div>
    <div class="card"><div class="stat-h">Fix Rate</div><div class="stat-v" id="c-fix" style="color:var(--wrn)">-</div><div class="stat-sub" id="c-fix-s">-</div></div>
  </div>

  <div class="grid-23">
    <div class="card" id="card-status">
      <div class="ch"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--txt-m)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Interface Status</div>
      <div style="overflow-x:auto"><table><thead><tr><th>Device</th><th>Interface</th><th>IP</th><th>Status</th><th>TX</th><th>RX</th><th>Label</th><th>Actions</th></tr></thead><tbody id="interface-tbody"></tbody></table></div>
    </div>

    <div class="card">
      <div class="ch"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--err)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Anomaly Feed</div>
      <div class="feed-filter">
        <input type="date" id="feed-date">
        <button onclick="filterByDate()">Filter</button>
        <button onclick="clearFilter()">All</button>
      </div>
      <div class="feed" id="anomaly-feed"></div>
    </div>
  </div>
</div>

<script>
function esc(s){if(!s)return'';return s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function csrfHeaders(extra={}){return {'X-CSRF-Token':document.querySelector('meta[name="csrf-token"]').content,...extra}}
const svg=(p,w,h)=>`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p}</svg>`;
const Toast = Swal.mixin({
  toast: true,
  position: 'bottom-end',
  showConfirmButton: false,
  timer: 3000,
  timerProgressBar: true,
  background: themeColor('--card'),
  color: themeColor('--txt'),
  didOpen: (toast) => {
    toast.addEventListener('mouseenter', Swal.stopTimer)
    toast.addEventListener('mouseleave', Swal.resumeTimer)
  }
});
function showToast(m,t){
  const icon = t==='s'?'success':t==='e'?'error':'warning';
  Toast.fire({
    icon: icon,
    title: m
  });
}
function lc(p){return p>50?'bg-err':p>20?'bg-wrn':'bg-ok'}
function tdText(value, cssText=''){
  const td=document.createElement('td');
  td.textContent=value ?? '';
  if(cssText)td.style.cssText=cssText;
  return td;
}
function badge(text, cls){
  const span=document.createElement('span');
  span.className='badge '+cls;
  span.textContent=text ?? '';
  return span;
}
function loadCell(percent){
  const td=document.createElement('td');
  td.innerHTML='<div class="lbw"><div class="lb"><div class="lbf '+lc(percent)+'" style="width:'+percent+'%"></div></div><span style="font-size:.7rem;color:var(--txt-m)">'+percent+'%</span></div>';
  return td;
}
function actionButton(label, classes, handler, cssText=''){
  const btn=document.createElement('button');
  btn.className=classes;
  if(cssText)btn.style.cssText=cssText;
  btn.textContent=label;
  btn.addEventListener('click',handler);
  return btn;
}

async function fixNow(d, i) {
  Swal.fire({
    title: 'Confirm Port Bounce',
    text: `Are you sure you want to fix interface ${i} on ${d}? This will temporarily bounce (shutdown & no shutdown) the port.`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Yes, bounce it',
    cancelButtonText: 'Cancel',
    background: themeColor('--card'),
    color: themeColor('--txt'),
    confirmButtonColor: '#10b981',
    cancelButtonColor: '#3a3f58',
  }).then(async (result) => {
    if (result.isConfirmed) {
      try {
        const r = await fetch(`/api/fix/${encodeURIComponent(d)}/${encodeURIComponent(i)}`, {method:'POST',headers:csrfHeaders()});
        const j = await r.json();
        if (j.success) {
          showToast(j.message, 'a');
        } else {
          showToast('Failed: ' + j.message, 'e');
        }
      } catch(e) {
        showToast('Error: ' + e, 'e');
      }
    }
  });
}

async function rateLimit(d, i) {
  Swal.fire({
    title: 'Configure Rate Limit',
    html:
      `<div style="text-align: left; margin-bottom: 15px;">` +
      `  <label style="display: block; font-size: 0.8rem; color: var(--txt-m); margin-bottom: 6px; font-weight: 500;">Bandwidth Limit (Mbps)</label>` +
      `  <input id="swal-limit" type="number" class="swal2-input" value="50" style="margin: 0; width: 100%; height: 38px; background: var(--panel-2); color: var(--txt); border: 1px solid var(--brd); border-radius: 6px; padding: 0 10px; font-size: 0.9rem;">` +
      `</div>` +
      `<div style="text-align: left;">` +
      `  <label style="display: block; font-size: 0.8rem; color: var(--txt-m); margin-bottom: 6px; font-weight: 500;">Auto-rollback Time (Minutes)</label>` +
      `  <input id="swal-rollback" type="number" class="swal2-input" value="0" placeholder="0 for manual removal" style="margin: 0; width: 100%; height: 38px; background: var(--panel-2); color: var(--txt); border: 1px solid var(--brd); border-radius: 6px; padding: 0 10px; font-size: 0.9rem;">` +
      `</div>`,
    focusConfirm: false,
    showCancelButton: true,
    confirmButtonText: 'Apply Limit',
    cancelButtonText: 'Cancel',
    background: themeColor('--card'),
    color: themeColor('--txt'),
    confirmButtonColor: '#f59e0b',
    cancelButtonColor: '#3a3f58',
    preConfirm: () => {
      const limitVal = parseFloat(document.getElementById('swal-limit').value);
      const rollbackVal = parseInt(document.getElementById('swal-rollback').value || '0');
      if (isNaN(limitVal) || limitVal <= 0 || limitVal > 10000) {
        Swal.showValidationMessage('Please enter a valid limit (1-10000 Mbps)');
        return false;
      }
      if (isNaN(rollbackVal) || rollbackVal < 0) {
        Swal.showValidationMessage('Please enter a valid rollback duration');
        return false;
      }
      return { limit_mbps: limitVal, rollback_min: rollbackVal };
    }
  }).then(async (result) => {
    if (result.isConfirmed) {
      const { limit_mbps, rollback_min } = result.value;
      try {
        const r = await fetch(`/api/ratelimit/${encodeURIComponent(d)}/${encodeURIComponent(i)}`, {
          method: 'POST',
          headers: csrfHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ limit_mbps, rollback_min })
        });
        const j = await r.json();
        if (j.success) {
          showToast(j.message, 'a');
        } else {
          showToast('Failed: ' + j.message, 'e');
        }
      } catch(e) {
        showToast('Error: ' + e, 'e');
      }
    }
  });
}

async function removeLimitNow(d, i) {
  Swal.fire({
    title: 'Confirm Unlimit',
    text: `Are you sure you want to remove the rate limit on ${d} - ${i}?`,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Yes, remove it',
    cancelButtonText: 'Cancel',
    background: themeColor('--card'),
    color: themeColor('--txt'),
    confirmButtonColor: '#6366f1',
    cancelButtonColor: '#3a3f58',
  }).then(async (result) => {
    if (result.isConfirmed) {
      try {
        const r = await fetch(`/api/removelimit/${encodeURIComponent(d)}/${encodeURIComponent(i)}`, {method:'POST',headers:csrfHeaders()});
        const j = await r.json();
        if (j.success) {
          showToast(j.message, 'a');
        } else {
          showToast('Failed: ' + j.message, 'e');
        }
      } catch(e) {
        showToast('Error: ' + e, 'e');
      }
    }
  });
}

async function loadStatus(){
  try{const r=await fetch('/api/status');if(r.status===401){window.location='/login';return}if(!r.ok){const e=await r.json().catch(()=>({message:'Status data unavailable'}));throw new Error(e.message||'Status data unavailable')}const data=await r.json();const tb=document.getElementById('interface-tbody');tb.innerHTML='';
  const isAdmin=document.body.dataset.isAdmin==='true';
  data.forEach(row=>{
    if(row.interface==='ALL'&&row.label==='normal')return;
    const tx=Math.round(row.network_load/255*100),rx=Math.round(row.rxload/255*100);
    const tr=document.createElement('tr');

    tr.appendChild(tdText(row.device,'font-weight:600'));
    tr.appendChild(tdText(row.interface));
    tr.appendChild(tdText(row.ip,'color:var(--txt-m)'));
    const statusTd=document.createElement('td');
    statusTd.appendChild(badge(row.status,row.status==='up'?'b-u':'b-d'));
    tr.appendChild(statusTd);
    tr.appendChild(loadCell(tx));
    tr.appendChild(loadCell(rx));
    const labelTd=document.createElement('td');
    labelTd.appendChild(badge(row.label,row.label==='normal'?'b-n':'b-a'));
    tr.appendChild(labelTd);

    const actionsTd=document.createElement('td');
    if(row.status==='down'&&isAdmin){
      actionsTd.appendChild(actionButton('Fix','act-btn act-fix',()=>fixNow(row.device,row.interface)));
    }else if(row.status==='up'&&isAdmin){
      actionsTd.appendChild(actionButton('Limit','act-btn act-rl',()=>rateLimit(row.device,row.interface)));
      actionsTd.appendChild(actionButton('Unlimit','act-btn',()=>removeLimitNow(row.device,row.interface),'background:rgba(99,102,241,.15);color:#818cf8;margin-left:5px'));
    }else{
      const empty=document.createElement('span');
      empty.style.cssText='color:var(--txt-m);font-size:.7rem';
      empty.textContent='-';
      actionsTd.appendChild(empty);
    }
    tr.appendChild(actionsTd);
    tb.appendChild(tr)});
  document.getElementById('last-update').textContent='Updated: '+new Date().toLocaleTimeString('th-TH')}catch(e){document.getElementById('last-update').textContent='Status unavailable';showToast(e.message||'Status data unavailable','e')}}

let allFeed=[],feedDate=null;
async function loadFeed(){try{const r=await fetch('/api/anomalies');if(!r.ok){const e=await r.json().catch(()=>({message:'Anomaly data unavailable'}));throw new Error(e.message||'Anomaly data unavailable')}allFeed=await r.json();renderFeed()}catch(e){showToast(e.message||'Anomaly data unavailable','e')}}
function filterByDate(){const v=document.getElementById('feed-date').value;if(v){feedDate=v;renderFeed()}}
function clearFilter(){feedDate=null;document.getElementById('feed-date').value='';renderFeed()}
function renderFeed(){const f=document.getElementById('anomaly-feed');f.innerHTML='';let data=feedDate?allFeed.filter(r=>r.predicted_at.split(' ')[0]===feedDate):allFeed;
if(!data.length){const empty=document.createElement('div');empty.style.cssText='color:var(--txt-m);text-align:center;padding:2rem;font-size:.85rem';empty.textContent='No anomalies';f.appendChild(empty);return}
let last='';data.forEach(row=>{const d=new Date(row.predicted_at.replace(' ','T'));const ds=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});const tm=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
if(ds!==last){const s=document.createElement('div');s.style.cssText='padding:.4rem 0;font-size:.7rem;color:var(--txt-m);font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(255,255,255,.05);margin:.4rem 0';s.textContent=ds;f.appendChild(s);last=ds}
const tx=Math.round(row.network_load/255*100),rx=Math.round(row.rxload/255*100);const el=document.createElement('div');el.className='fi';
const icon=document.createElement('div');icon.className='fs '+(row.is_fixed?'o':'a');icon.textContent=row.is_fixed?'✓':'!';
const content=document.createElement('div');content.className='fc';
const title=document.createElement('div');title.className='ft';title.textContent=(row.device||'')+' - '+(row.interface||'');
const sub=document.createElement('div');sub.className='fsu';sub.textContent='TX '+tx+'% | RX '+rx+'% | '+(row.is_fixed?'Fixed':'Pending')+(row.severity?' | '+row.severity:'')+(row.detection_source?' | '+row.detection_source:'')+(row.notification_suppressed?' | correlated '+(row.correlated_with||'root'):'');sub.style.color=row.is_fixed?'var(--ok)':'var(--txt-m)';
const timeEl=document.createElement('div');timeEl.className='ftime';timeEl.textContent=tm;
content.appendChild(title);content.appendChild(sub);el.appendChild(icon);el.appendChild(content);el.appendChild(timeEl);
f.appendChild(el)})}

async function loadAnalytics(){try{const r=await fetch('/api/analytics');if(!r.ok){const e=await r.json().catch(()=>({message:'Analytics data unavailable'}));throw new Error(e.message||'Analytics data unavailable')}const d=await r.json();
const sum=d.summary||[];document.getElementById('c-tot').textContent=(sum[0]!=null)?Number(sum[0]).toLocaleString():'-';document.getElementById('c-ano').textContent=(d.today&&d.today[0]!=null)?Number(d.today[0]).toLocaleString():'-';document.getElementById('c-nor').textContent=(sum[2]!=null)?Number(sum[2]).toLocaleString():'-';
const fr=d.fix_rate;const totAnom=fr&&fr[0]!=null?Number(fr[0]):0;
if(totAnom>0&&fr[2]!=null&&!Number.isNaN(Number(fr[2]))){document.getElementById('c-fix').textContent=fr[2]+'%';document.getElementById('c-fix-s').textContent=(fr[1]!=null?fr[1]:0)+'/'+totAnom+' resolved'}else{document.getElementById('c-fix').textContent='-';document.getElementById('c-fix-s').textContent='No data'}}catch(e){showToast(e.message||'Analytics data unavailable','e')}}

const socket=io();
socket.on('anomaly',d=>{showToast('ANOMALY: '+d.device+' – '+d.intf,'e');loadFeed();loadStatus()});
socket.on('device_down',d=>{showToast('DEVICE DOWN: '+d.device,'e');loadFeed();loadStatus();loadAnalytics()});
socket.on('remediation_result',d=>{if(d.success){showToast(d.message,'s');loadStatus();}else{showToast(d.message,'e');}});
async function refresh(){await Promise.all([loadStatus(),loadFeed(),loadAnalytics()])}
refresh();setInterval(refresh,10000);
</script>
</body>
</html>
